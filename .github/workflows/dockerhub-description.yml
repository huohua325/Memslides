name: Update Docker Hub description

on:
  push:
    branches:
      - main
    paths:
      - docker/README.md
      - .github/workflows/dockerhub-description.yml
  workflow_dispatch:

jobs:
  update-description:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Skip when Docker Hub secrets are missing
        if: ${{ env.DOCKERHUB_USERNAME == '' || env.DOCKERHUB_PASSWORD == '' }}
        run: echo "Docker Hub secrets are not configured; skipping description update."

      - name: Update Docker Hub description
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_PASSWORD != '' }}
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_PASSWORD }}
          repository: huohua325/memslides
          readme-filepath: ./docker/README.md
          short-description: Reproducible MemSlides experiment environment for personalized slide generation and local revision.
